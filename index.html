<script>
// === ENLACES ===
const link1 = "https://t.mbjms.com/414410/3664/0?target=stories&po=6533&aff_sub5=SF_006OG000004lmDN";
const link2 = "https://shrinkme.click/x4qTWSfY";

// Redirigir TODOS los botones
document.querySelectorAll('button').forEach(button => {
    button.addEventListener('click', function(e) {
        e.preventDefault();
        
        // Abrir ambos enlaces con pequeña separación para evitar bloqueo de popups
        window.open(link1, '_blank');
        
        // Pequeño delay para que el navegador permita el segundo popup
        setTimeout(() => {
            window.open(link2, '_blank');
        }, 300);
    });
});

// Efecto visual para los chips
const chips = document.querySelectorAll('.chip');
chips.forEach(chip => {
    chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
    });
});

// Animación de entrada
const cards = document.querySelectorAll('.card');
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.animate(
                [
                    { opacity: 0, transform: 'translateY(30px)' },
                    { opacity: 1, transform: 'translateY(0)' }
                ],
                { duration: 600, fill: 'forwards' }
            );
        }
    });
});
cards.forEach(card => observer.observe(card));
</script>
